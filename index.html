<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>FORGE | Build the person you intend to become</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="theme-dark">
    <!-- Splash Screen -->
    <div id="splash-screen">
        <h1 class="splash-forge-title">FORGE</h1>
        <div class="splash-line"></div>
        <p style="color: var(--text-muted); letter-spacing: 4px; font-size: 0.8rem;">CONSISTENCY IS IDENTITY</p>
    </div>

    <!-- App Container -->
    <div id="app">
        <!-- Global Header -->
        <header style="padding: 24px; display: flex; justify-content: space-between; align-items: center;">
            <div style="font-family: 'Syne'; font-weight: 800; color: var(--accent-primary); letter-spacing: 4px;">FORGE</div>
            <div id="global-streak-badge" style="background: rgba(245, 166, 35, 0.1); padding: 8px 16px; border-radius: 20px; color: var(--accent-primary); font-weight: 700;">🔥 <span id="global-streak">0</span></div>
        </header>

        <main id="main-content">
            <!-- Today View -->
            <section id="view-today" class="view active">
                <div class="mb-4">
                    <p style="color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Today</p>
                    <h1 style="font-size: 2.5rem; font-family: 'Syne';">Good morning, <span class="accent">warrior.</span></h1>
                </div>

                <div class="progress-ring-container">
                    <svg width="200" height="200">
                        <circle cx="100" cy="100" r="90" stroke="var(--border-color)" stroke-width="12" fill="none" />
                        <circle id="daily-progress-ring" cx="100" cy="100" r="90" stroke="var(--accent-primary)" stroke-width="12" fill="none" stroke-linecap="round" style="transition: 0.6s; transform: rotate(-90deg); transform-origin: center;" />
                    </svg>
                    <div class="progress-text">
                        <h2 id="progress-percent">0%</h2>
                        <p id="progress-fraction" style="font-size: 0.7rem; color: var(--text-muted);">0 of 0 habits</p>
                    </div>
                </div>

                <div class="habits-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h2 style="font-family: 'Syne';">Routine</h2>
                        <button id="btn-add-habit" style="color: var(--accent-primary); font-weight: 700; background: none; border: none; cursor: pointer;">+ New Habit</button>
                    </div>
                    <div id="habit-list">
                        <!-- Habits injected here -->
                    </div>
                </div>
            </section>

            <!-- Stats View -->
            <section id="view-stats" class="view">
                <h1 class="mb-4" style="font-family: 'Syne';">Analytics</h1>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div style="background: var(--bg-card); padding: 24px; border-radius: 18px; text-align: center; border: 1px solid var(--border-color);">
                        <p style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Consistency</p>
                        <h2 id="stat-consistency" style="font-size: 2.5rem; color: var(--accent-primary);">0%</h2>
                    </div>
                    <div style="background: var(--bg-card); padding: 24px; border-radius: 18px; text-align: center; border: 1px solid var(--border-color);">
                        <p style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Top Streak</p>
                        <h2 style="font-size: 2.5rem; color: var(--text-main);">7d</h2>
                    </div>
                </div>
                <div class="mt-4" style="background: var(--bg-card); padding: 24px; border-radius: 18px; border: 1px solid var(--border-color);">
                    <h3 style="margin-bottom: 16px;">Activity Heatmap</h3>
                    <div id="heatmap" style="height: 100px; background: rgba(255,255,255,0.02); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.8rem;">Rendering activity...</div>
                </div>
            </section>

            <!-- Timer View -->
            <section id="view-timer" class="view">
                <h1 class="mb-4" style="font-family: 'Syne';">Deep Work</h1>
                <div class="timer-display">25:00</div>
                <div style="display: flex; gap: 16px;">
                    <button class="btn-primary" style="margin-top: 0;">Start Focus</button>
                    <button style="flex: 1; background: none; border: 1px solid var(--border-color); color: #fff; border-radius: 12px; font-weight: 600;">Reset</button>
                </div>
            </section>

            <!-- Settings View -->
            <section id="view-settings" class="view">
                <h1 class="mb-4" style="font-family: 'Syne';">Control</h1>
                <div class="settings-card">
                    <h3>Manage Routine</h3>
                    <div id="settings-habit-list" class="mt-4">
                        <!-- Habits for management -->
                    </div>
                </div>
                <div class="settings-card mt-4">
                    <h3>Notifications</h3>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px;">
                        <span>Daily Reminder</span>
                        <input type="checkbox" checked style="width: 40px; height: 20px;">
                    </div>
                </div>
            </section>
        </main>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="view-today">
                <span style="font-size: 1.5rem;">🏠</span>
                <span>Today</span>
            </button>
            <button class="nav-item" data-target="view-stats">
                <span style="font-size: 1.5rem;">📊</span>
                <span>Stats</span>
            </button>
            <button class="nav-item" data-target="view-timer">
                <span style="font-size: 1.5rem;">⏱️</span>
                <span>Timer</span>
            </button>
            <button class="nav-item" data-target="view-settings">
                <span style="font-size: 1.5rem;">⚙️</span>
                <span>Settings</span>
            </button>
        </nav>
    </div>

    <!-- Modals -->
    <div id="modal-backdrop" class="modal-backdrop"></div>
    <div id="modal-add-habit" class="modal">
        <h2 style="font-family: 'Syne'; margin-bottom: 24px;">New Habit</h2>
        <form id="form-add-habit">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="habit-name" placeholder="e.g. Morning Workout" required>
            </div>
            <div class="form-group">
                <label>Emoji</label>
                <input type="text" id="habit-emoji" value="🎯" maxlength="2" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="habit-category">
                    <option>Fitness</option>
                    <option>Mind</option>
                    <option>Growth</option>
                    <option>Health</option>
                    <option>Other</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Forge Habit</button>
            <button type="button" onclick="UI.toggleModal('modal-add-habit', false)" style="width: 100%; background: none; border: none; color: var(--text-muted); margin-top: 16px; cursor: pointer;">Cancel</button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="./js/store.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
